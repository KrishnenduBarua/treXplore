<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - TreXplore</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="container">
        <div class="nav-wrapper">
          <div class="logo">
            <i class="fas fa-mountain"></i>
            <span>TreXplore</span>
          </div>
          <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="places.html">Explore Places</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="login.html" class="btn-login active">Login</a></li>
          </ul>
          <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
      <div class="auth-container">
        <div class="auth-box">
          <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Login to continue your journey</p>
          </div>

          <!-- Login Form -->
          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label><i class="fas fa-envelope"></i> Email</label>
              <input
                type="email"
                id="loginEmail"
                placeholder="Enter your email"
                required
              />
            </div>
            <div class="form-group">
              <label><i class="fas fa-lock"></i> Password</label>
              <input
                type="password"
                id="loginPassword"
                placeholder="Enter your password"
                required
              />
            </div>
            <div class="form-options">
              <label class="checkbox">
                <input type="checkbox" id="rememberMe" />
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <button type="submit" class="btn-auth">Login</button>
          </form>

        

          <div class="auth-footer">
            <p>
              Don't have an account? <a href="#" id="showSignup">Sign up</a>
            </p>
          </div>
        </div>

        <!-- Signup Form (Hidden by default) -->
        <div class="auth-box" id="signupBox" style="display: none">
          <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join TreXplore to start exploring</p>
          </div>

          <form id="signupForm" class="auth-form">
            <div class="form-group">
              <label><i class="fas fa-user"></i> Full Name</label>
              <input
                type="text"
                id="signupName"
                placeholder="Enter your full name"
                required
              />
            </div>
            <div class="form-group">
              <label><i class="fas fa-envelope"></i> Email</label>
              <input
                type="email"
                id="signupEmail"
                placeholder="Enter your email"
                required
              />
            </div>
            <div class="form-group">
              <label><i class="fas fa-phone"></i> Phone Number</label>
              <input
                type="tel"
                id="signupPhone"
                placeholder="Enter your phone number"
              />
            </div>
            <div class="form-group">
              <label><i class="fas fa-lock"></i> Password</label>
              <input
                type="password"
                id="signupPassword"
                placeholder="Create a password"
                required
              />
            </div>
            <div class="form-group">
              <label><i class="fas fa-lock"></i> Confirm Password</label>
              <input
                type="password"
                id="signupConfirmPassword"
                placeholder="Confirm your password"
                required
              />
            </div>
            <div class="form-options">
              <label class="checkbox">
                <input type="checkbox" id="agreeTerms" required />
                <span>I agree to the <a href="#">Terms & Conditions</a></span>
              </label>
            </div>
            <button type="submit" class="btn-auth">Sign Up</button>
          </form>

          <div class="auth-divider">
            <span>or continue with</span>
          </div>

          <div class="social-auth">
            <button class="social-btn google">
              <i class="fab fa-google"></i> Google
            </button>
            <button class="social-btn facebook">
              <i class="fab fa-facebook"></i> Facebook
            </button>
          </div>

          <div class="auth-footer">
            <p>Already have an account? <a href="#" id="showLogin">Login</a></p>
          </div>
        </div>
      </div>

      <div class="auth-background">
        <div class="auth-overlay"></div>
      </div>
    </section>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
